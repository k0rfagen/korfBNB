# version: '3.9'

services:
  db:
    image: postgres:15
    container_name: korfbnb_db
    restart: always
    environment:
      POSTGRES_DB: korfbnb_db
      POSTGRES_USER: korfbnb_db_user
      POSTGRES_PASSWORD: korfbnb_db_passw
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
  redis:
    image: redis:7
    container_name: redis
    restart: always
    # ports:
    #   - "6379:6379"
  web:
    build:
      context: .
    container_name: korfbnb_web
    restart: always
    # command: >
    #   sh -c "python manage.py migrate && gunicorn korfbnb.wsgi:application --bind 0.0.0.0:8000"
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    env_file:
      - .env
volumes:
  postgres_data: